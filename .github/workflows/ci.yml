name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch when a new commit is pushed
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Bumped 22.20.0 → 22.22.3 (latest 22.x maintenance LTS as of May 2026).
  # Required because lint-staged@17 declares engines.node >=22.22.1.
  # 22.22.3 includes CVE-2026-21637 (TLS error handler) + crypto stability
  # fixes from 22.22.0 round (CVE-2025-59465, 59466, 55130-32). Same major
  # so no runtime semantics change; Vercel Node 22 runtime still picks the
  # binary off our engines field. Local dev needs `nvm install 22.22.3`.
  NODE_VERSION: "22.22.3"
  PNPM_VERSION: "9.12.0"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Lint, typecheck, build — fast feedback on code quality
  # ─────────────────────────────────────────────────────────────────
  quality:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Unit tests
  #
  # Why 30 minutes:
  #   Integration tests hit MongoDB Atlas Flex in eu-region from GitHub
  #   Actions runners in US East. The round-trip latency is roughly
  #   5-6x what we see on a developer machine in Slovakia (~3.5 min
  #   locally), so 327 tests run ~13-18 min on CI. 30 min gives
  #   comfortable headroom for transient Atlas spikes without masking
  #   a genuinely runaway test.
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    # Same reasoning as the openapi job below — dependabot PRs don't get
    # repo secrets, and integration tests need a real Atlas connection.
    # Skipping for dependabot keeps their PRs unblocked on quality
    # signals (lint + typecheck + build), which is what we actually
    # want for dep bumps.
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
        env:
          NODE_ENV: test
          # Integration tests need an Atlas connection and Entra app
          # registration metadata. Stored as repo secrets and pointed
          # at the dev cluster (sfz-asset-mgmt-dev) whose Network Access
          # allows 0.0.0.0/0 for CI reachability. Unit tests don't read
          # these env vars, so leaving them set has no effect there.
          MONGO_URI: ${{ secrets.MONGO_URI_TEST }}
          ENTRA_API_CLIENT_ID: ${{ secrets.ENTRA_API_CLIENT_ID_TEST }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID_TEST }}

      - name: Upload coverage to artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_id }}
          path: "**/coverage/**"
          retention-days: 7
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────
  # Job 3: OpenAPI freshness check — the openapi.json committed to git
  # must match what `pnpm openapi:export` would produce from the current
  # source. Catches API changes where someone forgot to regenerate.
  # ──────────────────────────────────────────────────────────────
  openapi:
    name: OpenAPI Spec Freshness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    # Skipped for dependabot PRs because GitHub does not expose repo
    # secrets to dependabot-authored PRs (security policy: external bot
    # PRs are treated as untrusted). Without MONGO_URI / ENTRA_* the
    # export script can't boot Fastify (the swagger plugin transitively
    # depends on the mongo plugin). Dependabot bumps almost never touch
    # the OpenAPI surface anyway — they're npm patch/minor and GitHub
    # Action version bumps. Real OpenAPI-affecting changes come through
    # human-authored PRs which DO get secrets.
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm --filter @inventario/shared-types build

      - name: Check openapi.json is up to date
        run: pnpm --filter @inventario/api openapi:export -- --check
        env:
          NODE_ENV: test
          # Same Atlas / Entra credentials as the test job — the export
          # script boots the real server (which connects to Mongo) and
          # then dumps the OpenAPI document. We can't avoid the DB
          # connection without a deeper refactor of the swagger plugin.
          # The openapi:export script in apps/api/package.json uses
          # --env-file-if-exists so the missing .env.local on CI is fine
          # — these env vars take over.
          MONGO_URI: ${{ secrets.MONGO_URI_TEST }}
          ENTRA_API_CLIENT_ID: ${{ secrets.ENTRA_API_CLIENT_ID_TEST }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID_TEST }}

  # ─────────────────────────────────────────────────────────────────
  # Job 4: Commitlint — overiť, že commit messages spĺňajú konvenciu
  # (len pre PR, na main commity sa už nedá vrátiť)
  # ─────────────────────────────────────────────────────────────────
  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate commit messages
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
