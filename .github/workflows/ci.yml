name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch when a new commit is pushed
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.20.0"
  PNPM_VERSION: "9.12.0"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Lint, typecheck, build — fast feedback on code quality
  # ─────────────────────────────────────────────────────────────────
  quality:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Unit tests
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
        env:
          NODE_ENV: test
          # Integration tests need an Atlas connection and Entra app
          # registration metadata. Stored as repo secrets and pointed
          # at the dev cluster (sfz-asset-mgmt-dev) whose Network Access
          # allows 0.0.0.0/0 for CI reachability. Unit tests don't read
          # these env vars, so leaving them set has no effect there.
          MONGO_URI: ${{ secrets.MONGO_URI_TEST }}
          ENTRA_API_CLIENT_ID: ${{ secrets.ENTRA_API_CLIENT_ID_TEST }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID_TEST }}

      - name: Upload coverage to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: "**/coverage/**"
          retention-days: 7
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────
  # Job 3: OpenAPI freshness check — the openapi.json committed to git
  # must match what `pnpm openapi:export` would produce from the current
  # source. Catches API changes where someone forgot to regenerate.
  # ──────────────────────────────────────────────────────────────
  openapi:
    name: OpenAPI Spec Freshness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm --filter @inventario/shared-types build

      - name: Check openapi.json is up to date
        run: pnpm --filter @inventario/api openapi:export -- --check
        env:
          NODE_ENV: test
          # Same Atlas / Entra credentials as the test job — the export
          # script boots the real server (which connects to Mongo) and
          # then dumps the OpenAPI document. We can't avoid the DB
          # connection without a deeper refactor of the swagger plugin.
          MONGO_URI: ${{ secrets.MONGO_URI_TEST }}
          ENTRA_API_CLIENT_ID: ${{ secrets.ENTRA_API_CLIENT_ID_TEST }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID_TEST }}

  # ─────────────────────────────────────────────────────────────────
  # Job 4: Commitlint — overiť, že commit messages spĺňajú konvenciu
  # (len pre PR, na main commity sa už nedá vrátiť)
  # ─────────────────────────────────────────────────────────────────
  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate commit messages
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
