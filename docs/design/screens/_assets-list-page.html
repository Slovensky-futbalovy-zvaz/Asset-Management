Inventario · Assets list with filters + search — INTERACTIVE mockup.

Real behavior implemented:
  - Live search (filters as you type)
  - Multi-select category + location + status filters
  - View toggle: grid (cards) vs table (compact rows)
  - Sort dropdown
  - Mobile filter sheet (slides from bottom)
  - Tenant-aware demo data (each tenant shows different asset types)
-->
<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Majetok · Inventario</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: {
                sans: ['Poppins', 'system-ui', 'sans-serif'],
                mono: ['JetBrains Mono', 'Menlo', 'monospace'],
            }}},
        };
    </script>

    <style>
        :root {
            --brand-primary: #1a2d47;
            --brand-accent: #388fc3;
            --brand-bg: #f8f6f1;
            --brand-muted: #6b7a8d;
        }
        html[data-tenant='inter']    { --brand-primary: #003d7a; --brand-accent: #ffd700; --brand-bg: #fffef7; --brand-muted: #5a6a7d; }
        html[data-tenant='pezinok']  { --brand-primary: #6b1f3a; --brand-accent: #c9a961; --brand-bg: #faf6f0; --brand-muted: #7a6c5e; }
        html[data-tenant='kremnica'] { --brand-primary: #2d5a3d; --brand-accent: #d4a843; --brand-bg: #f7f9f5; --brand-muted: #6b7d6e; }

        body {
            background: var(--brand-bg);
            font-family: 'Poppins', system-ui, sans-serif;
            color: var(--brand-primary); margin: 0;
        }
        .brand-primary-bg { background-color: var(--brand-primary); }
        .brand-primary-text { color: var(--brand-primary); }
        .brand-accent-bg { background-color: var(--brand-accent); }
        .brand-accent-text { color: var(--brand-accent); }
        .brand-muted-text { color: var(--brand-muted); }
        .brand-accent-bg-soft { background-color: color-mix(in srgb, var(--brand-accent) 12%, white); }
        .brand-primary-bg-soft { background-color: color-mix(in srgb, var(--brand-primary) 8%, white); }
        .brand-accent-border { border-color: var(--brand-accent); }
        .wordmark { font-weight: 800; font-style: italic; letter-spacing: -0.02em; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

        /* Filter chip selected state */
        .chip-selected {
            background-color: var(--brand-primary);
            color: white;
            border-color: var(--brand-primary);
        }

        /* Asset thumbnail (CSS-only "image") */
        .asset-thumb {
            background: linear-gradient(135deg,
                color-mix(in srgb, var(--brand-primary) 80%, transparent) 0%,
                color-mix(in srgb, var(--brand-accent) 60%, var(--brand-primary)) 100%);
            position: relative;
            overflow: hidden;
        }
        .asset-thumb::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0,0,0,0.1) 0%, transparent 40%);
        }

        /* Mobile filter drawer */
        .filter-sheet {
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .filter-sheet.open { transform: translateY(0); }

        /* Hide elements based on view mode */
        body[data-view='grid'] .view-table { display: none; }
        body[data-view='table'] .view-grid { display: none; }

        /* No results state */
        .no-results { display: none; }
        body[data-empty='true'] .no-results { display: block; }
        body[data-empty='true'] .view-grid,
        body[data-empty='true'] .view-table { display: none; }

        /* Pulse for live indicators */
        @keyframes soft-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .pulse { animation: soft-pulse 2s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen antialiased" data-view="grid">

    <!-- TOP BAR -->
    <header class="brand-primary-bg text-white sticky top-0 z-40 shadow-md">
        <div class="px-4 lg:px-6 h-14 lg:h-16 flex items-center justify-between">
            <div class="flex items-center gap-3 min-w-0">
                <div class="w-8 h-8 lg:w-9 lg:h-9 rounded-lg bg-white/15 backdrop-blur border border-white/20 flex items-center justify-center flex-shrink-0">
                    <span class="wordmark text-base lg:text-lg text-white">I</span>
                </div>
                <div class="min-w-0">
                    <div class="wordmark text-sm lg:text-base text-white leading-tight truncate" id="brand-name">Inventario</div>
                    <div class="text-[10px] lg:text-xs text-white/60 leading-tight truncate" id="tenant-name">Demo prostredie</div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button class="relative p-2 hover:bg-white/10 rounded-lg transition">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                    <span class="absolute top-1.5 right-1.5 w-2 h-2 brand-accent-bg rounded-full pulse"></span>
                </button>
                <button class="flex items-center gap-2 hover:bg-white/10 rounded-lg p-1 transition">
                    <div class="w-7 h-7 lg:w-8 lg:h-8 rounded-full bg-white/20 flex items-center justify-center text-xs font-bold">JL</div>
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="flex">

        <!-- SIDEBAR (desktop) -->
        <aside class="hidden lg:flex flex-col w-60 bg-white border-r border-gray-200 min-h-[calc(100vh-4rem)] py-6 px-3">
            <nav class="space-y-1 text-sm">
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7m-9 2v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Dashboard
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 brand-primary-bg-soft brand-primary-text rounded-lg font-semibold">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                    Majetok
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"/></svg>
                    Moje výpožičky
                    <span class="ml-auto text-xs brand-accent-bg-soft brand-accent-text px-2 py-0.5 rounded-full font-semibold">3</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.6 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Žiadosti
                </a>
            </nav>

            <!-- Filters in sidebar (desktop) -->
            <div class="mt-6 pt-6 border-t border-gray-100 flex-1 overflow-y-auto">
                <div class="text-[10px] font-mono uppercase tracking-wider brand-muted-text px-3 mb-3">Kategórie</div>
                <div class="space-y-1 text-sm" id="sidebar-categories">
                    <button data-filter="category" data-value="all" class="filter-btn-active w-full text-left px-3 py-1.5 brand-primary-bg-soft brand-primary-text rounded font-medium flex justify-between items-center">
                        <span>Všetky</span><span class="text-xs brand-muted-text" id="cat-count-all">12</span>
                    </button>
                    <button data-filter="category" data-value="IT" class="w-full text-left px-3 py-1.5 text-gray-700 hover:bg-gray-50 rounded flex justify-between items-center">
                        <span>IT vybavenie</span><span class="text-xs brand-muted-text">5</span>
                    </button>
                    <button data-filter="category" data-value="Foto" class="w-full text-left px-3 py-1.5 text-gray-700 hover:bg-gray-50 rounded flex justify-between items-center">
                        <span>Foto/video</span><span class="text-xs brand-muted-text">3</span>
                    </button>
                    <button data-filter="category" data-value="Šport" class="w-full text-left px-3 py-1.5 text-gray-700 hover:bg-gray-50 rounded flex justify-between items-center">
                        <span>Športové</span><span class="text-xs brand-muted-text">2</span>
                    </button>
                    <button data-filter="category" data-value="Mobilita" class="w-full text-left px-3 py-1.5 text-gray-700 hover:bg-gray-50 rounded flex justify-between items-center">
                        <span>Mobilita</span><span class="text-xs brand-muted-text">2</span>
                    </button>
                </div>

                <div class="text-[10px] font-mono uppercase tracking-wider brand-muted-text px-3 mt-6 mb-3">Status</div>
                <div class="space-y-1 text-sm">
                    <button data-filter="status" data-value="all" class="filter-status-active w-full text-left px-3 py-1.5 brand-primary-bg-soft brand-primary-text rounded font-medium">Všetky statusy</button>
                    <button data-filter="status" data-value="available" class="w-full text-left px-3 py-1.5 text-gray-700 hover:bg-gray-50 rounded flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>Dostupné
                    </button>
                    <button data-filter="status" data-value="loaned" class="w-full text-left px-3 py-1.5 text-gray-700 hover:bg-gray-50 rounded flex items-center gap-2">
                        <span class="w-2 h-2 bg-amber-500 rounded-full"></span>Vypožičané
                    </button>
                    <button data-filter="status" data-value="maintenance" class="w-full text-left px-3 py-1.5 text-gray-700 hover:bg-gray-50 rounded flex items-center gap-2">
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>Servis
                    </button>
                </div>
            </div>
        </aside>

        <!-- CONTENT -->
        <main class="flex-1 min-w-0 px-4 sm:px-6 lg:px-8 py-6 lg:py-8 pb-32 lg:pb-8">

            <!-- Page header -->
            <div class="flex items-end justify-between gap-3 flex-wrap mb-4 lg:mb-6">
                <div>
                    <h1 class="text-2xl lg:text-3xl font-bold brand-primary-text">Majetok</h1>
                    <p class="brand-muted-text text-sm mt-1" id="result-summary">12 položiek · spravované organizáciou</p>
                </div>
                <div class="flex items-center gap-2">
                    <button class="hidden sm:flex items-center gap-1.5 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm font-medium hover:border-gray-300 transition">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        Export
                    </button>
                    <button class="brand-primary-bg text-white px-4 py-2 rounded-lg text-sm font-semibold hover:opacity-90 transition shadow flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                        <span class="hidden sm:inline">Pridať majetok</span>
                        <span class="sm:hidden">Pridať</span>
                    </button>
                </div>
            </div>

            <!-- Search + view toggle bar -->
            <div class="flex items-center gap-2 mb-4 lg:mb-5">
                <div class="flex-1 relative">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 brand-muted-text" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input
                        id="search-input"
                        type="search"
                        placeholder="Hľadať podľa názvu, čísla, štítku…"
                        class="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-[var(--brand-accent)] focus:border-transparent"
                    />
                    <kbd class="hidden lg:block absolute right-3 top-1/2 -translate-y-1/2 px-1.5 py-0.5 bg-gray-100 rounded text-[10px] font-mono text-gray-500">⌘K</kbd>
                </div>

                <!-- Mobile filter button -->
                <button id="open-filters-btn" class="lg:hidden flex items-center gap-1.5 px-3 py-2.5 bg-white border border-gray-200 rounded-lg text-sm font-medium">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.6a1 1 0 01-.3.7l-6.4 6.4a1 1 0 00-.3.7V17l-4 4v-7.6a1 1 0 00-.3-.7L3.3 6.3A1 1 0 013 5.6V4z"/></svg>
                    <span>Filtre</span>
                    <span id="mobile-filter-count" class="hidden brand-accent-bg-soft brand-accent-text text-[10px] px-1.5 py-0.5 rounded-full font-bold">0</span>
                </button>

                <!-- View toggle (na mobile s mensími padding-mi, ale stále viditelne) -->
                <div class="flex bg-white border border-gray-200 rounded-lg p-0.5 flex-shrink-0">
                    <button data-view-btn="grid" class="view-toggle px-2 sm:px-2.5 py-1.5 rounded brand-primary-bg text-white" title="Mriežka" aria-label="Zobraziť ako karty">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zm0 8a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zm8-8a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2h-2zm0 8a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2h-2z"/></svg>
                    </button>
                    <button data-view-btn="table" class="view-toggle px-2 sm:px-2.5 py-1.5 rounded text-gray-500 hover:text-gray-700" title="Zoznam" aria-label="Zobraziť ako zoznam">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 16a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"/></svg>
                    </button>
                </div>
            </div>

            <!-- Active filter chips -->
            <div id="active-chips" class="hidden flex-wrap gap-2 mb-4">
                <!-- chips inserted by JS -->
            </div>

            <!-- ────────────────────  GRID VIEW  ──────────────────── -->
            <div class="view-grid">
                <div id="asset-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 lg:gap-4">
                    <!-- Cards inserted by JS -->
                </div>
            </div>

            <!-- ────────────────────  TABLE VIEW  ──────────────────── -->
            <div class="view-table bg-white border border-gray-200 rounded-xl overflow-hidden">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 text-[10px] font-mono uppercase tracking-wider brand-muted-text sticky top-0">
                        <tr>
                            <th class="text-left px-4 py-3"><input type="checkbox" class="rounded border-gray-300" /></th>
                            <th class="text-left px-4 py-3">Inventárne č.</th>
                            <th class="text-left px-4 py-3">Názov</th>
                            <th class="text-left px-4 py-3 hidden md:table-cell">Kategória</th>
                            <th class="text-left px-4 py-3 hidden md:table-cell">Lokácia</th>
                            <th class="text-left px-4 py-3">Status</th>
                            <th class="text-right px-4 py-3"></th>
                        </tr>
                    </thead>
                    <tbody id="asset-table-body" class="divide-y divide-gray-100">
                        <!-- Rows inserted by JS -->
                    </tbody>
                </table>
            </div>

            <!-- No results -->
            <div class="no-results bg-white border border-dashed border-gray-300 rounded-xl py-16 text-center">
                <svg class="w-12 h-12 mx-auto brand-muted-text mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <h3 class="font-bold brand-primary-text">Nič sme nenašli</h3>
                <p class="text-sm brand-muted-text mt-1">Skús zmeniť vyhľadávanie alebo filtre.</p>
            </div>
        </main>
    </div>

    <!-- MOBILE FILTER SHEET -->
    <div id="filter-sheet-backdrop" class="hidden fixed inset-0 bg-black/40 z-40 lg:hidden"></div>
    <div id="filter-sheet" class="filter-sheet fixed inset-x-0 bottom-0 z-50 bg-white rounded-t-2xl shadow-2xl lg:hidden max-h-[85vh] overflow-y-auto">
        <div class="sticky top-0 bg-white px-5 py-4 border-b border-gray-100 flex items-center justify-between">
            <h3 class="font-bold brand-primary-text">Filtre</h3>
            <button id="close-filters-btn" class="p-1 hover:bg-gray-100 rounded">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="p-5 space-y-6">
            <!-- Mobile: category as chips -->
            <div>
                <div class="text-[10px] font-mono uppercase tracking-wider brand-muted-text mb-2">Kategória</div>
                <div class="flex flex-wrap gap-2" id="mobile-categories">
                    <button data-filter="category" data-value="all" class="filter-btn-active chip-selected px-3 py-1.5 border border-gray-200 rounded-full text-sm font-medium">Všetky</button>
                    <button data-filter="category" data-value="IT" class="px-3 py-1.5 bg-white border border-gray-200 rounded-full text-sm">IT</button>
                    <button data-filter="category" data-value="Foto" class="px-3 py-1.5 bg-white border border-gray-200 rounded-full text-sm">Foto/video</button>
                    <button data-filter="category" data-value="Šport" class="px-3 py-1.5 bg-white border border-gray-200 rounded-full text-sm">Šport</button>
                    <button data-filter="category" data-value="Mobilita" class="px-3 py-1.5 bg-white border border-gray-200 rounded-full text-sm">Mobilita</button>
                </div>
            </div>
            <div>
                <div class="text-[10px] font-mono uppercase tracking-wider brand-muted-text mb-2">Status</div>
                <div class="flex flex-wrap gap-2" id="mobile-statuses">
                    <button data-filter="status" data-value="all" class="filter-status-active chip-selected px-3 py-1.5 border border-gray-200 rounded-full text-sm font-medium">Všetky</button>
                    <button data-filter="status" data-value="available" class="px-3 py-1.5 bg-white border border-gray-200 rounded-full text-sm">Dostupné</button>
                    <button data-filter="status" data-value="loaned" class="px-3 py-1.5 bg-white border border-gray-200 rounded-full text-sm">Vypožičané</button>
                    <button data-filter="status" data-value="maintenance" class="px-3 py-1.5 bg-white border border-gray-200 rounded-full text-sm">Servis</button>
                </div>
            </div>
        </div>
        <div class="sticky bottom-0 bg-white border-t border-gray-100 p-4 flex gap-2">
            <button id="reset-filters" class="flex-1 px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm font-medium">Resetovať</button>
            <button id="apply-filters" class="flex-1 px-4 py-2.5 brand-primary-bg text-white rounded-lg text-sm font-semibold">Použiť filtre</button>
        </div>
    </div>

    <!-- BOTTOM NAV (mobile) -->
    <nav class="lg:hidden fixed bottom-0 inset-x-0 bg-white border-t border-gray-200 z-30 grid grid-cols-5 shadow-2xl">
        <button class="flex flex-col items-center gap-1 py-2.5 text-gray-500">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7m-9 2v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span class="text-[10px]">Domov</span>
        </button>
        <button class="flex flex-col items-center gap-1 py-2.5 brand-primary-text">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>

                        !a.subcategory.toLowerCase().includes(q) &&

                return true;
            });

                document.body.setAttribute('data-empty', 'true');
            } else {
                document.body.setAttribute('data-empty', 'false');

            if (chips.length === 0) {
                chipsContainer.classList.add('hidden');
                chipsContainer.classList.remove('flex');
                document.getElementById('mobile-filter-count').classList.add('hidden');
                return;

            chipsContainer.classList.remove('hidden');
            chipsContainer.classList.add('flex');

            `).join('') + `

            `;

            chipsContainer.querySelectorAll('[data-clear-chip]').forEach((b) => {

                    if (k === 'search') document.getElementById('search-input').value = '';
                    syncFilterButtons();
                    update();

            document.getElementById('clear-all-chips').addEventListener('click', () => {
                activeFilters = { category: 'all', status: 'all', search: '' };

                update();
            });

            // Mobile count
            const mc = document.getElementById('mobile-filter-count');
            mc.classList.remove('hidden');
            mc.textContent = chips.length;
        }

            document.querySelectorAll('[data-filter="category"]').forEach((b) => {
                const isActive = b.dataset.value === activeFilters.category;

                b.classList.toggle('font-medium', isActive);

            document.querySelectorAll('[data-filter="status"]').forEach((b) => {

        }

        const backdrop = document.getElementById('filter-sheet-backdrop');
        document.getElementById('open-filters-btn').addEventListener('click', () => {
            sheet.classList.add('open');
            backdrop.classList.remove('hidden');
        });
        function closeSheet() {
            sheet.classList.remove('open');
            backdrop.classList.add('hidden');
        }
        document.getElementById('close-filters-btn').addEventListener('click', closeSheet);
        document.getElementById('apply-filters').addEventListener('click', closeSheet);
        document.getElementById('reset-filters').addEventListener('click', () => {
            activeFilters = { category: 'all', status: 'all', search: '' };
            document.getElementById('search-input').value = '';
            syncFilterButtons();
            update();
        });
        backdrop.addEventListener('click', closeSheet);

        // Initial render
        update();
    </script>
</body>
</html>
