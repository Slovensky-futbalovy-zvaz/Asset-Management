<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
    <!-- 3 horizontálne čiary = vrstvy majetku (currentColor pre flexibilitu) -->
    <rect x="5"  y="7"  width="22" height="4" rx="1" fill="currentColor" fill-opacity="0.95"/>
    <rect x="5"  y="14" width="17" height="4" rx="1" fill="currentColor" fill-opacity="0.75"/>
    <rect x="5"  y="21" width="12" height="4" rx="1" fill="currentColor" fill-opacity="0.55"/>

    <!-- Modrý accent dot (fixed brand-accent farba) -->
    <circle cx="25" cy="23" r="2.2" fill="#388fc3"/>
</svg>
